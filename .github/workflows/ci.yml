name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

jobs:
  # ── Python backend tests ─────────────────────────────────────────────────────
  backend:
    name: Backend tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install light dependencies
        # Install only stdlib-level deps needed to import the package for logic tests.
        # essentia and librosa are heavy native libs that require audio build tools on CI
        # and are not needed for the pure-logic test suite. test_audio_analysis.py is
        # excluded below because it requires actual audio engine imports.
        run: |
          pip install --upgrade pip
          pip install \
            numpy \
            tqdm \
            pretty_midi \
            soundfile \
            pytest

      - name: Install package (no heavy deps)
        run: pip install -e . --no-deps

      - name: Run backend tests
        # Exclude test_audio_analysis.py — it needs librosa/essentia at import time
        run: pytest tests/ --ignore=tests/test_audio_analysis.py -v

  # ── Frontend unit tests ──────────────────────────────────────────────────────
  frontend:
    name: Frontend unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Type check
        working-directory: web
        run: npm run type-check

      - name: Run unit tests
        working-directory: web
        run: npm test

  # ── Playwright e2e tests ─────────────────────────────────────────────────────
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: frontend  # only run e2e if unit tests pass

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install chromium --with-deps

      - name: Run e2e tests
        working-directory: web
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
